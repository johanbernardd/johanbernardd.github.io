<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>johanbernardd's Portfolio</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="mediaqueries.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/universal-sentence-encoder"></script>
  </head>
  <body>
    <nav id="desktop-nav">
      <div class="logo">Johanes Bernard</div>
      <div>
        <ul class="nav-links">
          <li><a href="#profile">Profile</a></li>
        </ul>
      </div>
    </nav>
    <nav id="hamburger-nav">
      <div class="logo">Johanes Bernard</div>
      <div class="hamburger-menu">
        <div class="hamburger-icon" onclick="toggleMenu()">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="menu-links">
          <li><a href="#profile" onclick="toggleMenu()">Profile</a></li>
        </div>
      </div>
    </nav>
    <section id="profile">
      <div class="section__pic-container">
        <img src="./assets/profile-pic.png" alt="Johanes Bernard Profile Pic" />
      </div>
      <div class="section__text">
        <div id="section-title-container">
          <p class="section__text__p1">Hello, I'm</p>
          <h1 class="title">Johanes Bernard</h1>
        </div>
        <p class="section__text__p2">Data Scientist</p>
        <div class="btn-container">
          <button
            class="btn btn-color-1"
            onclick="window.open('./assets/cv.pdf')"
          >
            CV/Resume
          </button>
          <div id="socials-container">
            <img
              src="./assets/linkedin.png"
              alt="My LinkedIn Profile"
              class="icon"
              onclick="location.href='https://linkedin.com/in/johanespurek'"
            />
            <img
              src="./assets/github.png"
              alt="My GitHub Profile"
              class="icon"
              onclick="location.href='https://github.com/johanbernardd'"
            />
          </div>
        </div>
        <div id="ai">
          <div id="first_assistant_desc">Ask me anything about Johanes!</div>
          <input
            type="text"
            id="myInput"
            placeholder="Type your question here..."
          />
          <div id="loading_dots" style="display: none">Thinking...</div>
          <div id="output" style="display: none"></div>
          <script src="ai.js"></script>
        </div>
      </div>
    </section>
    <footer>
      <p>Copyright &#169; 2025 Johanes Bernard. All Rights Reserved.</p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
